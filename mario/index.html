<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Mario Infinite - DX Edition</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #1a1a2e; /* 页面深色背景凸显游戏区域 */
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #game-container {
            position: relative;
            box-shadow: 0 10px 50px rgba(0,0,0,0.8);
            border: 4px solid #fff;
            border-radius: 8px;
            overflow: hidden;
            background: #5C94FC;
        }
        canvas { display: block; }
        .ui-layer {
            position: absolute;
            top: 0;
            width: 100%;
            padding: 15px 20px;
            box-sizing: border-box;
            color: white;
            display: flex;
            justify-content: space-between;
            text-shadow: 2px 2px 0px #000;
            font-weight: bold;
            font-size: 18px;
            pointer-events: none;
            z-index: 10;
        }
        .status-bar {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            text-shadow: 1px 1px 0px #000;
            display: flex;
            gap: 15px;
            font-size: 14px;
        }
        .controls-hint {
            color: #ddd;
            margin-top: 20px;
            background: rgba(255,255,255,0.1);
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
            line-height: 1.5;
        }
        .highlight { color: #FFD700; font-weight: bold; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="ui-layer">
        <div>SCORE: <span id="score">0</span></div>
        <div>COINS: <span id="coinCount" style="color:#FFD700">0</span></div>
        <div>BEST: <span id="highScore" style="color:#ff6b6b">0</span></div>
    </div>
    <div class="status-bar">
        <div id="dashStatus">DASH: READY</div>
        <div id="starStatus" style="color:#FFD700; display:none;">INVINCIBLE!</div>
    </div>
    <canvas id="gameCanvas"></canvas>
</div>

<div class="controls-hint">
    Move: <span class="highlight">ARROWS / WASD</span> | 
    Jump: <span class="highlight">SPACE / UP</span> (Can Double Jump!) | 
    Dash: <span class="highlight">SHIFT</span>
</div>

<script>
/**
 * INFINITE RUNNER DX ENGINE
 * Upgrades: Procedural Animation, Particles, Parallax, Double Jump, Dash, Powerups
 */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 800;
canvas.height = 400;

// Game Constants
const GRAVITY = 0.6;
const FRICTION = 0.8;
const MAX_SPEED = 6;
const JUMP_FORCE = -11;

// State
let score = 0;
let coins = 0;
let highScore = localStorage.getItem('mario_dx_highscore') || 0;
let cameraX = 0;
let lastGeneratedX = 800;
let frameCount = 0;

document.getElementById('highScore').innerText = highScore;

// Player Entity
const player = {
    x: 100, y: 200, w: 24, h: 36,
    velX: 0, velY: 0,
    grounded: false,
    facingRight: true,
    doubleJumped: false,
    dashCooldown: 0,
    invincibleTimer: 0
};

// World Arrays
let platforms = [{ x: 0, y: 350, w: 1000, h: 50, type: 'ground' }];
let entities = []; 
let particles = [];
let clouds = [];

// Init Clouds
for(let i=0; i<10; i++) {
    clouds.push({ x: Math.random() * 1000, y: Math.random() * 150 + 20, speed: Math.random() * 0.5 + 0.1, size: Math.random() * 30 + 20 });
}

const keys = {};

// --- Audio Synthesizer ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSfx(freq1, freq2, type, duration, vol=0.1) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.setValueAtTime(freq1, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(freq2, audioCtx.currentTime + duration);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + duration);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

// --- Particles System ---
function spawnParticles(x, y, color, count, speedScale=1) {
    for (let i = 0; i < count; i++) {
        particles.push({
            x: x, y: y,
            vx: (Math.random() - 0.5) * 5 * speedScale,
            vy: (Math.random() - 0.5) * 5 * speedScale,
            life: 1.0, color: color, size: Math.random() * 4 + 2
        });
    }
}

// --- Procedural Generation ---
function generateContent() {
    while (lastGeneratedX < cameraX + canvas.width + 600) {
        let gap = Math.random() * 120 + 60; // Wider gaps allowed due to double jump/dash
        let width = Math.random() * 200 + 100;
        let height = 220 + Math.random() * 130;
        
        platforms.push({ x: lastGeneratedX + gap, y: height, w: width, h: 40, type: 'brick' });
        
        // Coins structure
        if (Math.random() > 0.2) {
            let numCoins = Math.floor(Math.random() * 3) + 1;
            for(let i=0; i<numCoins; i++) {
                entities.push({
                    x: lastGeneratedX + gap + (width/2) - 10 + (i*25 - (numCoins*12)),
                    y: height - 40 - (Math.sin(i)*15),
                    w: 16, h: 16, type: 'coin', collected: false, startY: height - 40 - (Math.sin(i)*15)
                });
            }
        }

        // Enemies
        if (Math.random() > 0.6) {
            let isFlying = Math.random() > 0.7;
            entities.push({
                x: lastGeneratedX + gap + width - 40,
                y: isFlying ? height - 100 : height - 24,
                w: 24, h: 24, type: isFlying ? 'flyer' : 'walker', speed: isFlying ? -3 : -1.5, dead: false, startY: height - 100
            });
        }

        // Powerups (Star)
        if (Math.random() > 0.92) {
            entities.push({
                x: lastGeneratedX + gap + 20,
                y: height - 60,
                w: 20, h: 20, type: 'star', collected: false
            });
        }

        lastGeneratedX += gap + width;
    }
}

// --- Input Handling (Triggers) ---
window.addEventListener('keydown', e => {
    if (!keys[e.code]) {
        // Jump Logic
        if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
            if (player.grounded) {
                player.velY = JUMP_FORCE;
                player.grounded = false;
                spawnParticles(player.x + player.w/2, player.y + player.h, '#fff', 5);
                playSfx(150, 600, 'square', 0.15);
            } else if (!player.doubleJumped) {
                player.velY = JUMP_FORCE * 0.9;
                player.doubleJumped = true;
                spawnParticles(player.x + player.w/2, player.y + player.h, '#4DB8FF', 10);
                playSfx(300, 800, 'square', 0.15);
            }
        }
        // Dash Logic
        if ((e.code === 'ShiftLeft' || e.code === 'ShiftRight') && player.dashCooldown <= 0) {
            player.velX = player.facingRight ? 18 : -18;
            player.dashCooldown = 90; // 1.5 seconds cooldown
            spawnParticles(player.x + player.w/2, player.y + player.h/2, '#FF5555', 15, 2);
            playSfx(800, 200, 'sawtooth', 0.2);
        }
    }
    keys[e.code] = true;
});
window.addEventListener('keyup', e => keys[e.code] = false);

// --- Logic Update ---
function update() {
    frameCount++;
    let currentMaxSpeed = player.invincibleTimer > 0 ? MAX_SPEED * 1.5 : MAX_SPEED;

    // Movement
    if (keys['ArrowRight'] || keys['KeyD']) { 
        if (player.velX < currentMaxSpeed) player.velX += 1.2; 
        player.facingRight = true;
    }
    if (keys['ArrowLeft'] || keys['KeyA']) { 
        if (player.velX > -currentMaxSpeed) player.velX -= 1.2; 
        player.facingRight = false;
    }

    // Dash trail effect
    if (Math.abs(player.velX) > currentMaxSpeed + 1) {
        particles.push({
            x: player.x + Math.random()*player.w, y: player.y + Math.random()*player.h,
            vx: 0, vy: 0, life: 0.5, color: 'rgba(255,255,255,0.5)', size: 4
        });
    }

    player.velX *= FRICTION;
    player.velY += GRAVITY;
    player.x += player.velX;
    player.y += player.velY;

    // Cooldowns
    if (player.dashCooldown > 0) player.dashCooldown--;
    if (player.invincibleTimer > 0) {
        player.invincibleTimer--;
        if(frameCount % 5 === 0) spawnParticles(player.x + player.w/2, player.y + player.h/2, '#FFD700', 1);
    }

    // Collision & Platforms
    player.grounded = false;
    platforms.forEach(p => {
        if (player.x < p.x + p.w && player.x + player.w > p.x &&
            player.y < p.y + p.h && player.y + player.h > p.y) {
            
            // Top collision
            if (player.velY > 0 && player.y + player.h - player.velY <= p.y + 5) {
                player.grounded = true;
                player.doubleJumped = false;
                player.y = p.y - player.h;
                player.velY = 0;
            } else if (player.velY < 0 && player.y - player.velY >= p.y + p.h - 5) { // Bottom collision
                player.y = p.y + p.h;
                player.velY = 0;
            } else { // Side collision
                player.x -= player.velX;
                player.velX = 0;
            }
        }
    });

    // Entities Logic
    for (let i = entities.length - 1; i >= 0; i--) {
        let en = entities[i];
        
        // Entity Animations
        if (en.type === 'coin' && !en.collected) en.y = en.startY + Math.sin(frameCount * 0.1) * 3;
        if (en.type === 'flyer' && !en.dead) en.y = en.startY + Math.sin(frameCount * 0.05) * 30;

        // Interaction
        if (!en.dead && !en.collected) {
            // Movement for enemies
            if (en.type === 'walker' || en.type === 'flyer') en.x += en.speed;

            // Box Collision
            if (player.x < en.x + en.w && player.x + player.w > en.x &&
                player.y < en.y + en.h && player.y + player.h > en.y) {
                
                if (en.type === 'coin') {
                    en.collected = true;
                    coins++;
                    score += 50;
                    spawnParticles(en.x + 8, en.y + 8, '#FFD700', 8);
                    playSfx(800, 1200, 'sine', 0.1);
                } 
                else if (en.type === 'star') {
                    en.collected = true;
                    player.invincibleTimer = 300; // 5 seconds at 60fps
                    spawnParticles(en.x + 10, en.y + 10, '#FFffff', 20, 2);
                    playSfx(400, 1600, 'sine', 0.5, 0.2);
                    score += 200;
                }
                else if (en.type === 'walker' || en.type === 'flyer') {
                    if (player.invincibleTimer > 0) {
                        // Destroy enemy with star
                        en.dead = true;
                        score += 100;
                        spawnParticles(en.x + 12, en.y + 12, '#FFA500', 15);
                        playSfx(200, 100, 'sawtooth', 0.1);
                    } else if (player.velY > 0 && player.y < en.y + 10) {
                        // Stomp enemy
                        en.dead = true;
                        player.velY = JUMP_FORCE * 0.8;
                        score += 100;
                        spawnParticles(en.x + 12, en.y + 12, '#ddd', 10);
                        playSfx(200, 100, 'sawtooth', 0.1);
                    } else {
                        gameOver();
                    }
                }
            }
        }
    }

    // Particles logic
    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx; p.y += p.vy;
        p.life -= 0.02;
        if (p.life <= 0) particles.splice(i, 1);
    }

    // Clouds logic
    clouds.forEach(c => {
        c.x -= c.speed;
        // Wrap clouds around the screen relative to camera
        if (c.x < cameraX - 200) {
            c.x = cameraX + canvas.width + 100;
            c.y = Math.random() * 150 + 20;
        }
    });

    // Score based on distance
    let currentDistScore = Math.floor(player.x / 10);
    if (currentDistScore > score) score = currentDistScore;

    // Smooth Camera Follow
    let targetCameraX = player.x - canvas.width * 0.3; // Player stays at 30% of screen
    if (targetCameraX > cameraX) cameraX += (targetCameraX - cameraX) * 0.1;
    
    // Death
    if (player.y > canvas.height + 50) gameOver();

    // Cleanup old entities to prevent memory leaks
    if (frameCount % 60 === 0) {
        entities = entities.filter(en => en.x > cameraX - 300 && (!en.dead && !en.collected));
        platforms = platforms.filter(p => p.x + p.w > cameraX - 500);
    }

    generateContent();
    updateUI();
}

function updateUI() {
    document.getElementById('score').innerText = score;
    document.getElementById('coinCount').innerText = coins;
    
    const dashStatus = document.getElementById('dashStatus');
    if (player.dashCooldown > 0) {
        dashStatus.innerText = `DASH: ${Math.ceil(player.dashCooldown/60)}s`;
        dashStatus.style.color = '#888';
    } else {
        dashStatus.innerText = 'DASH: READY (SHIFT)';
        dashStatus.style.color = '#4DB8FF';
    }

    const starStatus = document.getElementById('starStatus');
    if (player.invincibleTimer > 0) {
        starStatus.style.display = 'block';
        starStatus.style.color = frameCount % 10 < 5 ? '#FFD700' : '#FF5555';
    } else {
        starStatus.style.display = 'none';
    }
}

function gameOver() {
    if (score > highScore) {
        highScore = score;
        localStorage.setItem('mario_dx_highscore', highScore);
        document.getElementById('highScore').innerText = highScore;
    }
    // Shake effect could go here
    playSfx(300, 50, 'sawtooth', 0.5, 0.3);
    
    // Reset State
    player.x = 100; player.y = 200; player.velX = 0; player.velY = 0;
    player.dashCooldown = 0; player.invincibleTimer = 0; player.doubleJumped = false;
    score = 0; coins = 0; cameraX = 0; lastGeneratedX = 800;
    platforms = [{ x: -100, y: 350, w: 1200, h: 50, type: 'ground' }];
    entities = [];
    particles = [];
}

// --- Rendering ---
function drawPlayer(ctx) {
    ctx.save();
    ctx.translate(player.x + player.w/2, player.y + player.h/2);
    
    if (!player.facingRight) ctx.scale(-1, 1); // Flip horizontally

    // Invincibility flashing effect
    let isFlashing = player.invincibleTimer > 0 && frameCount % 6 < 3;
    let hatColor = isFlashing ? '#FFD700' : '#E52521';
    let shirtColor = isFlashing ? '#fff' : '#E52521';
    let pantsColor = isFlashing ? '#FF5555' : '#00439C';
    let skinColor = '#FFCC99';

    // Animation variables
    let speedNorm = Math.min(Math.abs(player.velX) / MAX_SPEED, 1);
    let walkCycle = player.grounded ? Math.sin(frameCount * 0.3) * speedNorm : 0;
    let armSwing = player.grounded ? Math.cos(frameCount * 0.3) * speedNorm : 0;

    // Head / Hat
    ctx.fillStyle = hatColor;
    ctx.fillRect(-8, -18, 16, 8); // Hat top
    ctx.fillRect(-8, -14, 20, 4); // Hat brim

    // Face
    ctx.fillStyle = skinColor;
    ctx.fillRect(-6, -10, 14, 10); // Head base
    ctx.fillStyle = '#4D2600'; // Hair/Mustache
    ctx.fillRect(-8, -10, 4, 8); // Back hair
    ctx.fillRect(4, -4, 6, 2); // Mustache

    // Body (Overalls)
    ctx.fillStyle = pantsColor;
    ctx.fillRect(-6, 0, 12, 10);
    ctx.fillStyle = shirtColor;
    ctx.fillRect(-4, 0, 8, 6);

    // Arms
    ctx.fillStyle = shirtColor;
    if (!player.grounded) {
        // Jump pose: Arms up
        ctx.fillRect(-4, -4, 4, 10); // Back arm
        ctx.fillRect(-2, -6, 6, 4);  // Front arm up
    } else {
        // Walk pose
        ctx.save();
        ctx.translate(0, 2);
        ctx.rotate(armSwing * 0.5);
        ctx.fillRect(-2, 0, 4, 8); // Front arm
        ctx.restore();
    }

    // Legs
    ctx.fillStyle = pantsColor;
    if (!player.grounded) {
        // Jump pose: Legs split
        ctx.fillRect(-8, 10, 6, 8);
        ctx.fillRect(2, 6, 6, 8);
    } else {
        // Walk cycle
        ctx.fillRect(-4 + walkCycle * 6, 10, 6, 8); // Front leg
        ctx.fillRect(-4 - walkCycle * 6, 10, 6, 8); // Back leg
    }

    // Shoes
    ctx.fillStyle = '#663300';
    if (!player.grounded) {
        ctx.fillRect(-8, 16, 8, 4);
        ctx.fillRect(2, 12, 8, 4);
    } else {
        ctx.fillRect(-4 + walkCycle * 6, 16, 8, 4);
        ctx.fillRect(-4 - walkCycle * 6, 16, 8, 4);
    }

    ctx.restore();
}

function draw() {
    // Background Clear & Gradient
    let bgGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
    bgGradient.addColorStop(0, '#5C94FC');
    bgGradient.addColorStop(1, '#9EE2FF');
    ctx.fillStyle = bgGradient;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    
    // Parallax Clouds (Moves slower than camera)
    ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
    clouds.forEach(c => {
        let drawX = c.x - (cameraX * 0.2); // Parallax effect
        ctx.beginPath();
        ctx.arc(drawX, c.y, c.size, 0, Math.PI*2);
        ctx.arc(drawX + c.size*0.8, c.y - c.size*0.3, c.size*0.8, 0, Math.PI*2);
        ctx.arc(drawX + c.size*1.5, c.y, c.size*0.9, 0, Math.PI*2);
        ctx.fill();
    });

    // Translate World Camera
    ctx.translate(-cameraX, 0);

    // Draw Platforms
    platforms.forEach(p => {
        if (p.type === 'ground') {
            ctx.fillStyle = '#c84c0c'; // Dirt
            ctx.fillRect(p.x, p.y, p.w, p.h);
            ctx.fillStyle = '#78c000'; // Grass top
            ctx.fillRect(p.x, p.y, p.w, 10);
        } else {
            // Brick pattern
            ctx.fillStyle = '#cc4c0c';
            ctx.fillRect(p.x, p.y, p.w, p.h);
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            ctx.strokeRect(p.x, p.y, p.w, p.h);
            // Simple brick lines
            for(let i=0; i<p.w; i+=20) {
                ctx.beginPath(); ctx.moveTo(p.x+i, p.y); ctx.lineTo(p.x+i, p.y+p.h); ctx.stroke();
            }
            ctx.beginPath(); ctx.moveTo(p.x, p.y+p.h/2); ctx.lineTo(p.x+p.w, p.y+p.h/2); ctx.stroke();
        }
    });

    // Draw Entities
    entities.forEach(en => {
        if (en.type === 'coin' && !en.collected) {
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.arc(en.x + 8, en.y + 8, 8, 0, Math.PI*2);
            ctx.fill();
            // Coin shine
            ctx.fillStyle = '#fff';
            ctx.fillRect(en.x + 4, en.y + 4, 4, 4);
        } 
        else if (en.type === 'star' && !en.collected) {
            ctx.fillStyle = frameCount % 10 < 5 ? '#FFD700' : '#FFffff';
            ctx.beginPath();
            ctx.arc(en.x + 10, en.y + 10, 10, 0, Math.PI*2);
            ctx.fill();
            // Star eyes
            ctx.fillStyle = '#000';
            ctx.fillRect(en.x+6, en.y+6, 2, 4);
            ctx.fillRect(en.x+12, en.y+6, 2, 4);
        }
        else if ((en.type === 'walker' || en.type === 'flyer') && !en.dead) {
            ctx.fillStyle = en.type === 'walker' ? '#8B4513' : '#FF4500';
            ctx.fillRect(en.x, en.y, en.w, en.h);
            
            // Angry Eyes
            ctx.fillStyle = '#fff';
            ctx.fillRect(en.x + 4, en.y + 4, 6, 6);
            ctx.fillRect(en.x + 14, en.y + 4, 6, 6);
            ctx.fillStyle = '#000';
            ctx.fillRect(en.x + 6, en.y + 6, 2, 2);
            ctx.fillRect(en.x + 14, en.y + 6, 2, 2);

            // Wings for flyer
            if (en.type === 'flyer') {
                ctx.fillStyle = '#eee';
                let wingOffset = Math.sin(frameCount * 0.5) * 5;
                ctx.fillRect(en.x + 8, en.y - 8 + wingOffset, 8, 8);
            }
        }
    });

    // Draw Particles
    particles.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life;
        ctx.fillRect(p.x, p.y, p.size, p.size);
        ctx.globalAlpha = 1.0;
    });

    // Draw Procedural Player
    drawPlayer(ctx);

    ctx.restore();
}

// Main Game Loop
function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

// Start Game
gameLoop();
</script>
</body>
</html>
