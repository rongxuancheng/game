<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Mario Infinite - Procedural Runner</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #5C94FC;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #game-container {
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.6);
            border: 6px solid #fff;
            background: #5C94FC;
        }
        canvas { display: block; }
        .ui-layer {
            position: absolute;
            top: 0;
            width: 100%;
            padding: 15px;
            box-sizing: border-box;
            color: white;
            display: flex;
            justify-content: space-between;
            text-shadow: 2px 2px #000;
            font-size: 20px;
            pointer-events: none;
        }
        .controls-hint {
            color: white;
            margin-top: 15px;
            background: rgba(0,0,0,0.3);
            padding: 10px 20px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="ui-layer">
        <div>COINS: <span id="coinCount">0</span></div>
        <div>SCORE: <span id="score">0</span></div>
        <div>BEST: <span id="highScore">0</span></div>
    </div>
    <canvas id="gameCanvas"></canvas>
</div>

<div class="controls-hint">
    Use <b>ARROWS</b> or <b>WASD</b> to Move & Jump
</div>

<script>
/**
 * INFINITE MARIO ENGINE
 * Features: Procedural Generation, High Score Persistence, Sound Synthesis
 */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 800;
canvas.height = 400;

// Game Constants
const GRAVITY = 0.7;
const FRICTION = 0.8;
const PLAYER_SPEED = 5;
const JUMP_FORCE = -14;

// Game State
let score = 0;
let coins = 0;
let highScore = localStorage.getItem('mario_high_score') || 0;
let cameraX = 0;
let lastGeneratedX = 800;

document.getElementById('highScore').innerText = highScore;

const player = {
    x: 100, y: 200, w: 30, h: 40,
    velX: 0, velY: 0,
    grounded: false
};

let platforms = [
    { x: 0, y: 350, w: 1000, h: 50, type: 'ground' }
];
let entities = []; // Coins and Enemies

const keys = {};

// --- Audio Synthesizer ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSfx(freq1, freq2, type, duration) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.setValueAtTime(freq1, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(freq2, audioCtx.currentTime + duration);
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + duration);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

// --- Procedural Generation ---
function generateContent() {
    // Generate new platforms/coins if player is approaching the "edge" of the world
    while (lastGeneratedX < cameraX + canvas.width + 500) {
        let gap = Math.random() * 80 + 50;
        let width = Math.random() * 150 + 80;
        let height = 250 + Math.random() * 100;
        
        // Add platform
        platforms.push({ x: lastGeneratedX + gap, y: height, w: width, h: 40, type: 'brick' });
        
        // Add coins above platforms
        if (Math.random() > 0.3) {
            entities.push({
                x: lastGeneratedX + gap + (width/2) - 10,
                y: height - 40,
                w: 20, h: 20, type: 'coin', collected: false
            });
        }

        // Add enemy occasionally
        if (Math.random() > 0.7) {
            entities.push({
                x: lastGeneratedX + gap + 20,
                y: height - 30,
                w: 30, h: 30, type: 'enemy', speed: -2, dead: false
            });
        }

        lastGeneratedX += gap + width;
    }
}

// --- Logic ---
function update() {
    if (keys['ArrowRight'] || keys['KeyD']) { if (player.velX < PLAYER_SPEED) player.velX++; }
    if (keys['ArrowLeft'] || keys['KeyA']) { if (player.velX > -PLAYER_SPEED) player.velX--; }
    if ((keys['Space'] || keys['ArrowUp'] || keys['KeyW']) && player.grounded) {
        player.velY = JUMP_FORCE;
        player.grounded = false;
        playSfx(150, 600, 'square', 0.1);
    }

    player.velX *= FRICTION;
    player.velY += GRAVITY;
    player.x += player.velX;
    player.y += player.velY;

    // Collision & Camera
    player.grounded = false;
    platforms.forEach(p => {
        if (player.x < p.x + p.w && player.x + player.w > p.x &&
            player.y < p.y + p.h && player.y + player.h > p.y) {
            if (player.velY > 0) {
                player.grounded = true;
                player.y = p.y - player.h;
                player.velY = 0;
            }
        }
    });

    // Entities Logic (Coins & Enemies)
    entities.forEach(en => {
        if (en.type === 'coin' && !en.collected) {
            if (player.x < en.x + en.w && player.x + player.w > en.x &&
                player.y < en.y + en.h && player.y + player.h > en.y) {
                en.collected = true;
                coins++;
                score += 50;
                playSfx(800, 1200, 'sine', 0.1);
            }
        }
        if (en.type === 'enemy' && !en.dead) {
            en.x += en.speed;
            if (player.x < en.x + en.w && player.x + player.w > en.x &&
                player.y < en.y + en.h && player.y + player.h > en.y) {
                if (player.velY > 0 && player.y < en.y) {
                    en.dead = true;
                    player.velY = JUMP_FORCE/2;
                    score += 100;
                    playSfx(200, 100, 'sawtooth', 0.1);
                } else {
                    gameOver();
                }
            }
        }
    });

    // Score based on distance
    let currentDistScore = Math.floor(player.x / 10);
    if (currentDistScore > score) score = currentDistScore;

    // Camera following
    if (player.x > cameraX + canvas.width/2) cameraX = player.x - canvas.width/2;
    
    // Fall death
    if (player.y > canvas.height) gameOver();

    generateContent();
    updateUI();
}

function updateUI() {
    document.getElementById('score').innerText = score;
    document.getElementById('coinCount').innerText = coins;
}

function gameOver() {
    if (score > highScore) {
        highScore = score;
        localStorage.setItem('mario_high_score', highScore);
        document.getElementById('highScore').innerText = highScore;
    }
    // Reset
    player.x = 100; player.y = 200; player.velX = 0; player.velY = 0;
    score = 0; coins = 0; cameraX = 0; lastGeneratedX = 800;
    platforms = [{ x: 0, y: 350, w: 1000, h: 50, type: 'ground' }];
    entities = [];
}

// --- Draw ---
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(-cameraX, 0);

    // Platforms
    platforms.forEach(p => {
        ctx.fillStyle = p.type === 'ground' ? '#8B4513' : '#FF914D';
        ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.strokeStyle = 'rgba(0,0,0,0.2)';
        ctx.strokeRect(p.x, p.y, p.w, p.h);
    });

    // Entities
    entities.forEach(en => {
        if (en.type === 'coin' && !en.collected) {
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.arc(en.x + 10, en.y + 10, 8, 0, Math.PI*2);
            ctx.fill();
        } else if (en.type === 'enemy' && !en.dead) {
            ctx.fillStyle = '#704214';
            ctx.fillRect(en.x, en.y, en.w, en.h);
        }
    });

    // Player
    ctx.fillStyle = '#FF0000';
    ctx.fillRect(player.x, player.y, player.w, player.h);
    ctx.fillStyle = '#0000FF'; // Overalls
    ctx.fillRect(player.x, player.y + 25, player.w, 15);

    ctx.restore();
    requestAnimationFrame(() => { update(); draw(); });
}

window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);
draw();
</script>
</body>
</html>
